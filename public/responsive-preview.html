<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Preview — Portfolio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111;
    --bar-bg: #1a1a1a;
    --bezel: #1a1a1a;
    --blue: #2A2AFF;
    --blue-hover: #3d3dff;
    --text: #999;
    --text-hover: #ccc;
    --text-active: #fff;
    --shadow: rgba(0, 0, 0, 0.55);
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* ================================================================
     SWITCHER BAR
     ================================================================ */
  .bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 10px 16px;
    background: var(--bar-bg);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    user-select: none;
  }

  .bar-group { position: relative; }

  .bar-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 18px;
    border: none; border-radius: 999px;
    background: transparent;
    color: var(--text);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: background 0.25s var(--ease), color 0.25s var(--ease);
    white-space: nowrap;
  }
  .bar-btn:hover { background: rgba(255, 255, 255, 0.06); color: var(--text-hover); }
  .bar-btn.active { background: var(--blue); color: var(--text-active); }
  .bar-btn.active:hover { background: var(--blue-hover); }
  .bar-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .caret { font-size: 9px; margin-left: 1px; opacity: 0.55; }

  /* Dropdown menus */
  .dropdown {
    position: absolute; top: calc(100% + 8px); left: 50%;
    transform: translateX(-50%) translateY(-6px);
    background: #222; border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px; padding: 4px; min-width: 185px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
    z-index: 200;
  }
  .dropdown.open {
    opacity: 1; pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .dropdown button {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 9px 14px; border: none; border-radius: 10px;
    background: transparent; color: var(--text); font-size: 13px;
    cursor: pointer; text-align: left;
    transition: background 0.15s, color 0.15s;
  }
  .dropdown button:hover { background: rgba(255, 255, 255, 0.06); color: #fff; }
  .dropdown button.dd-active { color: var(--blue); }
  .dropdown button svg { width: 14px; height: 14px; flex-shrink: 0; }

  .sep { width: 1px; height: 22px; background: rgba(255, 255, 255, 0.08); margin: 0 6px; }

  /* ================================================================
     STAGE (viewport area)
     ================================================================ */
  .stage {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    padding-top: 56px;
    opacity: 1;
    transition: opacity 0.35s var(--ease);
  }
  .stage.hidden {
    opacity: 0; pointer-events: none;
  }

  .device-scaler {
    transform-origin: center center;
    transition: transform 0.4s var(--ease);
  }

  /* ================================================================
     PHONE FRAME
     ================================================================ */
  .phone-frame {
    position: relative;
    background: var(--bezel);
    border-radius: 44px;
    padding: 16px;
    box-shadow:
      0 0 0 1.5px rgba(255, 255, 255, 0.06),
      0 16px 56px var(--shadow);
  }
  /* Notch */
  .phone-frame::before {
    content: '';
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 90px; height: 6px;
    background: #000; border-radius: 10px;
    z-index: 2;
  }
  .phone-frame .screen {
    position: relative;
    border-radius: 30px; overflow: hidden; background: #000;
  }
  .phone-frame .screen iframe { border: none; display: block; }

  /* Portrait phone */
  .phone-portrait .phone-frame .screen { width: 375px; height: 812px; }
  .phone-portrait .phone-frame .screen iframe { width: 375px; height: 812px; }
  .phone-portrait .device-scaler { transform: scale(0.95); }

  /* Landscape phone */
  .phone-landscape .phone-frame {
    border-radius: 44px;
  }
  .phone-landscape .phone-frame::before {
    /* Notch on the left side for landscape */
    top: 50%; left: 11px; transform: translateY(-50%);
    width: 6px; height: 90px;
  }
  .phone-landscape .phone-frame .screen { width: 812px; height: 375px; }
  .phone-landscape .phone-frame .screen iframe { width: 812px; height: 375px; }
  .phone-landscape .device-scaler { transform: scale(0.95); }

  /* ================================================================
     TABLET FRAME
     ================================================================ */
  .tablet-frame {
    position: relative;
    background: var(--bezel);
    border-radius: 24px;
    padding: 22px;
    box-shadow:
      0 0 0 1.5px rgba(255, 255, 255, 0.06),
      0 16px 56px var(--shadow);
  }
  .tablet-frame .screen {
    position: relative;
    border-radius: 6px; overflow: hidden; background: #000;
  }
  .tablet-frame .screen iframe { border: none; display: block; }

  /* Portrait tablet */
  .tablet-portrait .tablet-frame .screen { width: 768px; height: 1024px; }
  .tablet-portrait .tablet-frame .screen iframe { width: 768px; height: 1024px; }
  .tablet-portrait .device-scaler { transform: scale(0.67); }

  /* Landscape tablet */
  .tablet-landscape .tablet-frame .screen { width: 1024px; height: 768px; }
  .tablet-landscape .tablet-frame .screen iframe { width: 1024px; height: 768px; }
  .tablet-landscape .device-scaler { transform: scale(0.67); }

  /* ================================================================
     LAPTOP FRAME
     ================================================================ */
  .laptop-wrap { display: flex; flex-direction: column; align-items: center; }

  .laptop-screen {
    position: relative;
    background: var(--bezel);
    border-radius: 12px 12px 0 0;
    padding: 14px 14px 0 14px;
    box-shadow:
      0 0 0 1.5px rgba(255, 255, 255, 0.06),
      0 -4px 32px var(--shadow);
  }
  .laptop-screen .screen {
    position: relative;
    border-radius: 4px 4px 0 0; overflow: hidden; background: #000;
    width: 1440px; height: 900px;
  }
  .laptop-screen .screen iframe {
    border: none; display: block; width: 1440px; height: 900px;
  }

  .laptop-base {
    width: calc(100% + 80px); height: 20px;
    background: linear-gradient(180deg, #2c2c2c 0%, #1a1a1a 100%);
    border-radius: 0 0 10px 10px;
    position: relative;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
  }
  .laptop-base::before {
    content: '';
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 140px; height: 5px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 0 0 6px 6px;
  }

  .laptop-view .device-scaler { transform: scale(0.52); }

  /* ================================================================
     COMPARE VIEW
     ================================================================ */
  .compare-stage {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    padding-top: 56px;
  }

  .compare-container {
    position: relative;
    width: 92vw;
    height: 65vh;
  }

  .compare-laptop {
    position: absolute;
    bottom: 0; left: 2%;
    transform: scale(0.48);
    transform-origin: bottom left;
    z-index: 1;
  }

  .compare-tablet {
    position: absolute;
    bottom: 0; right: 12%;
    transform: scale(0.38);
    transform-origin: bottom right;
    z-index: 2;
  }
  .compare-tablet .tablet-frame .screen { width: 1024px; height: 768px; }
  .compare-tablet .tablet-frame .screen iframe {
    width: 1024px; height: 768px; border: none; display: block;
  }

  .compare-phone {
    position: absolute;
    bottom: 0; right: 5%;
    transform: scale(0.32);
    transform-origin: bottom right;
    z-index: 3;
  }
  .compare-phone .phone-frame .screen { width: 375px; height: 812px; }
  .compare-phone .phone-frame .screen iframe {
    width: 375px; height: 812px; border: none; display: block;
  }

  /* ================================================================
     LOADING SPINNER
     ================================================================ */
  .screen-loader {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000; z-index: 5;
    transition: opacity 0.4s;
  }
  .screen-loader.loaded { opacity: 0; pointer-events: none; }

  .spinner {
    width: 26px; height: 26px;
    border: 2.5px solid rgba(255, 255, 255, 0.08);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ================================================================
     DIMENSION LABEL
     ================================================================ */
  .dim-label {
    display: block; text-align: center;
    margin-top: 16px;
    color: #555; font-size: 11px;
    font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: opacity 0.3s;
  }

  /* ================================================================
     RESPONSIVE (for the preview tool itself)
     ================================================================ */
  @media (max-height: 750px) {
    .phone-portrait .device-scaler,
    .phone-landscape .device-scaler { transform: scale(0.72); }
    .tablet-portrait .device-scaler,
    .tablet-landscape .device-scaler { transform: scale(0.5); }
    .laptop-view .device-scaler { transform: scale(0.38); }
    .compare-laptop { transform: scale(0.35); }
    .compare-tablet { transform: scale(0.28); }
    .compare-phone { transform: scale(0.24); }
  }
  @media (max-width: 900px) {
    .phone-portrait .device-scaler { transform: scale(0.72); }
    .phone-landscape .device-scaler { transform: scale(0.52); }
    .tablet-portrait .device-scaler,
    .tablet-landscape .device-scaler { transform: scale(0.45); }
    .laptop-view .device-scaler { transform: scale(0.35); }
    .bar { gap: 2px; padding: 8px 10px; }
    .bar-btn { padding: 7px 12px; font-size: 12px; }
    .compare-laptop { transform: scale(0.32); }
    .compare-tablet { transform: scale(0.26); }
    .compare-phone { transform: scale(0.22); }
  }
</style>
</head>
<body>

<!-- ================================================================
     SWITCHER BAR
     ================================================================ -->
<nav class="bar" id="bar">

  <!-- Phone dropdown group -->
  <div class="bar-group" id="phoneGroup">
    <button class="bar-btn active" id="phoneBtn" data-group="phone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
        <rect x="7" y="2" width="10" height="20" rx="2.5"/>
        <circle cx="12" cy="19" r="0.7" fill="currentColor" stroke="none"/>
      </svg>
      Phone <span class="caret">&#9662;</span>
    </button>
    <div class="dropdown" id="phoneDd">
      <button class="dd-active" data-view="phone-portrait">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="7" y="2" width="10" height="20" rx="2.5"/>
        </svg>
        Portrait &mdash; 375 &times; 812
      </button>
      <button data-view="phone-landscape">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="7" width="20" height="10" rx="2.5"/>
        </svg>
        Landscape &mdash; 812 &times; 375
      </button>
    </div>
  </div>

  <!-- Tablet dropdown group -->
  <div class="bar-group" id="tabletGroup">
    <button class="bar-btn" id="tabletBtn" data-group="tablet">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
        <rect x="4" y="2" width="16" height="20" rx="2.5"/>
        <circle cx="12" cy="19" r="0.7" fill="currentColor" stroke="none"/>
      </svg>
      Tablet <span class="caret">&#9662;</span>
    </button>
    <div class="dropdown" id="tabletDd">
      <button data-view="tablet-portrait">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="4" y="2" width="16" height="20" rx="2.5"/>
        </svg>
        Portrait &mdash; 768 &times; 1024
      </button>
      <button data-view="tablet-landscape">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="4" width="20" height="16" rx="2.5"/>
        </svg>
        Landscape &mdash; 1024 &times; 768
      </button>
    </div>
  </div>

  <div class="sep"></div>

  <!-- Laptop -->
  <button class="bar-btn" id="laptopBtn" data-view="laptop">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
      <rect x="3" y="4" width="18" height="12" rx="1.5"/>
      <path d="M1 18h22" stroke-linecap="round"/>
    </svg>
    Laptop
  </button>

  <div class="sep"></div>

  <!-- Compare -->
  <button class="bar-btn" id="compareBtn" data-view="compare">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="1" y="4" width="15" height="10" rx="1.5"/>
      <rect x="10" y="8" width="9" height="12" rx="1.5"/>
      <path d="M0 16h17" stroke-linecap="round"/>
    </svg>
    Compare
  </button>
</nav>

<!-- ================================================================
     DEVICE STAGES
     ================================================================ -->

<!-- Phone Portrait (default, loaded eagerly) -->
<div class="stage phone-portrait" id="stage-phone-portrait">
  <div class="device-scaler">
    <div class="phone-frame">
      <div class="screen">
        <div class="screen-loader" id="loader-phone-portrait"><div class="spinner"></div></div>
        <iframe id="iframe-phone-portrait" src="http://localhost:5173"></iframe>
      </div>
    </div>
    <span class="dim-label">375 &times; 812</span>
  </div>
</div>

<!-- Phone Landscape -->
<div class="stage phone-landscape hidden" id="stage-phone-landscape">
  <div class="device-scaler">
    <div class="phone-frame">
      <div class="screen">
        <div class="screen-loader" id="loader-phone-landscape"><div class="spinner"></div></div>
        <iframe id="iframe-phone-landscape" src="about:blank"></iframe>
      </div>
    </div>
    <span class="dim-label">812 &times; 375</span>
  </div>
</div>

<!-- Tablet Portrait -->
<div class="stage tablet-portrait hidden" id="stage-tablet-portrait">
  <div class="device-scaler">
    <div class="tablet-frame">
      <div class="screen">
        <div class="screen-loader" id="loader-tablet-portrait"><div class="spinner"></div></div>
        <iframe id="iframe-tablet-portrait" src="about:blank"></iframe>
      </div>
    </div>
    <span class="dim-label">768 &times; 1024</span>
  </div>
</div>

<!-- Tablet Landscape -->
<div class="stage tablet-landscape hidden" id="stage-tablet-landscape">
  <div class="device-scaler">
    <div class="tablet-frame">
      <div class="screen">
        <div class="screen-loader" id="loader-tablet-landscape"><div class="spinner"></div></div>
        <iframe id="iframe-tablet-landscape" src="about:blank"></iframe>
      </div>
    </div>
    <span class="dim-label">1024 &times; 768</span>
  </div>
</div>

<!-- Laptop -->
<div class="stage laptop-view hidden" id="stage-laptop">
  <div class="device-scaler">
    <div class="laptop-wrap">
      <div class="laptop-screen">
        <div class="screen">
          <div class="screen-loader" id="loader-laptop"><div class="spinner"></div></div>
          <iframe id="iframe-laptop" src="about:blank"></iframe>
        </div>
      </div>
      <div class="laptop-base"></div>
    </div>
    <span class="dim-label">1440 &times; 900</span>
  </div>
</div>

<!-- Compare (all devices overlapping) -->
<div class="stage compare-stage hidden" id="stage-compare">
  <div class="compare-container">

    <!-- Laptop (back) -->
    <div class="compare-laptop">
      <div class="laptop-wrap">
        <div class="laptop-screen">
          <div class="screen">
            <div class="screen-loader" id="loader-cmp-laptop"><div class="spinner"></div></div>
            <iframe id="iframe-cmp-laptop" src="about:blank"></iframe>
          </div>
        </div>
        <div class="laptop-base"></div>
      </div>
    </div>

    <!-- Tablet (middle) -->
    <div class="compare-tablet">
      <div class="tablet-frame">
        <div class="screen">
          <div class="screen-loader" id="loader-cmp-tablet"><div class="spinner"></div></div>
          <iframe id="iframe-cmp-tablet" src="about:blank"></iframe>
        </div>
      </div>
    </div>

    <!-- Phone (front) -->
    <div class="compare-phone">
      <div class="phone-frame">
        <div class="screen">
          <div class="screen-loader" id="loader-cmp-phone"><div class="spinner"></div></div>
          <iframe id="iframe-cmp-phone" src="about:blank"></iframe>
        </div>
      </div>
    </div>

  </div>
</div>


<!-- ================================================================
     SCRIPT
     ================================================================ -->
<script>
(function () {
  'use strict';

  var SRC = 'http://localhost:5173';
  var current = 'phone-portrait';
  var loaded = { 'phone-portrait': true };

  // ── Map view names to group button IDs ──
  var groupOf = {
    'phone-portrait':  'phoneBtn',
    'phone-landscape': 'phoneBtn',
    'tablet-portrait':  'tabletBtn',
    'tablet-landscape': 'tabletBtn',
    'laptop':  'laptopBtn',
    'compare': 'compareBtn'
  };

  // ── Iframe / loader pairs ──
  var pairs = [
    ['iframe-phone-portrait',  'loader-phone-portrait'],
    ['iframe-phone-landscape', 'loader-phone-landscape'],
    ['iframe-tablet-portrait', 'loader-tablet-portrait'],
    ['iframe-tablet-landscape','loader-tablet-landscape'],
    ['iframe-laptop',          'loader-laptop'],
    ['iframe-cmp-laptop',      'loader-cmp-laptop'],
    ['iframe-cmp-tablet',      'loader-cmp-tablet'],
    ['iframe-cmp-phone',       'loader-cmp-phone']
  ];

  // Attach load listeners to hide spinners
  pairs.forEach(function (p) {
    var iframe = document.getElementById(p[0]);
    var loader = document.getElementById(p[1]);
    if (iframe && loader) {
      iframe.addEventListener('load', function () {
        if (iframe.src && iframe.src !== 'about:blank') {
          loader.classList.add('loaded');
        }
      });
    }
  });

  // ── Lazy-load helper ──
  function ensureLoaded(view) {
    if (loaded[view]) return;
    loaded[view] = true;

    if (view === 'compare') {
      ['iframe-cmp-laptop', 'iframe-cmp-tablet', 'iframe-cmp-phone'].forEach(function (id) {
        var f = document.getElementById(id);
        if (f && (!f.src || f.src === 'about:blank')) f.src = SRC;
      });
      return;
    }

    var f = document.getElementById('iframe-' + view);
    if (f && (!f.src || f.src === 'about:blank')) f.src = SRC;
  }

  // ── Dropdown logic ──
  var openDd = null;

  function openDropdown(id) {
    var el = document.getElementById(id);
    if (openDd && openDd !== el) openDd.classList.remove('open');
    el.classList.toggle('open');
    openDd = el.classList.contains('open') ? el : null;
  }

  function closeDropdowns() {
    if (openDd) { openDd.classList.remove('open'); openDd = null; }
  }

  // ── Update dropdown "active" checks ──
  function markDropdownActive(view) {
    document.querySelectorAll('#phoneDd button').forEach(function (b) {
      b.classList.toggle('dd-active', b.getAttribute('data-view') === view);
    });
    document.querySelectorAll('#tabletDd button').forEach(function (b) {
      b.classList.toggle('dd-active', b.getAttribute('data-view') === view);
    });
  }

  // ── Switch view (core) ──
  function switchView(view) {
    if (view === current) { closeDropdowns(); return; }

    // Hide all stages
    document.querySelectorAll('.stage').forEach(function (s) { s.classList.add('hidden'); });

    // Show target
    var stage = document.getElementById('stage-' + view);
    if (stage) stage.classList.remove('hidden');

    ensureLoaded(view);

    // Update button highlights
    ['phoneBtn', 'tabletBtn', 'laptopBtn', 'compareBtn'].forEach(function (id) {
      document.getElementById(id).classList.remove('active');
    });
    var btn = groupOf[view];
    if (btn) document.getElementById(btn).classList.add('active');

    markDropdownActive(view);
    closeDropdowns();
    current = view;
  }

  // ── Wire up bar buttons ──

  // Group buttons (phone, tablet) toggle their dropdown
  document.getElementById('phoneBtn').addEventListener('click', function (e) {
    e.stopPropagation();
    openDropdown('phoneDd');
  });
  document.getElementById('tabletBtn').addEventListener('click', function (e) {
    e.stopPropagation();
    openDropdown('tabletDd');
  });

  // Dropdown items
  document.querySelectorAll('.dropdown button[data-view]').forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      switchView(btn.getAttribute('data-view'));
    });
  });

  // Direct buttons (laptop, compare)
  document.getElementById('laptopBtn').addEventListener('click', function () {
    closeDropdowns();
    switchView('laptop');
  });
  document.getElementById('compareBtn').addEventListener('click', function () {
    closeDropdowns();
    switchView('compare');
  });

  // Click outside closes dropdowns
  document.addEventListener('click', function (e) {
    if (!e.target.closest('.bar-group')) closeDropdowns();
  });

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', function (e) {
    // Don't capture when typing in an input
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
      case '1': switchView('phone-portrait'); break;
      case '2': switchView('phone-landscape'); break;
      case '3': switchView('tablet-portrait'); break;
      case '4': switchView('tablet-landscape'); break;
      case '5': switchView('laptop'); break;
      case '6': switchView('compare'); break;
      case 'Escape': closeDropdowns(); break;
    }
  });

  // ── Init ──
  markDropdownActive('phone-portrait');
})();
</script>
</body>
</html>
